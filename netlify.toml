[build]
  command = "npm run build"
  publish = "dist"

# ── SPA routing — send all routes to index.html ──────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'strict-dynamic'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://abuki-backend.onrender.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
